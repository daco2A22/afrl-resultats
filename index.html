<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AFRL — Résultats Coupe de France 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#06080f;--surface:#0d1220;--surface2:#111827;
  --border:rgba(255,255,255,0.07);--accent:#e8192c;
  --accent3:#3b82f6;--text:#f0f4ff;--muted:#6b7a99;
  --gold:#fbbf24;--silver:#94a3b8;--bronze:#cd7c3a;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(232,25,44,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(232,25,44,0.025) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;inset:0;background:url('bg.webp') center/cover no-repeat;opacity:0.07;pointer-events:none;z-index:0;}

/* HEADER */
header{position:relative;z-index:20;background:rgba(6,8,15,0.97);border-bottom:1px solid var(--border);}
.header-inner{max-width:1300px;margin:0 auto;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:64px;}
.header-right{font-family:'Rajdhani',sans-serif;font-size:.8rem;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;}

/* HERO */
.hero{position:relative;z-index:5;text-align:center;padding:2.5rem 1rem 1.5rem;}
.hero-eyebrow{font-family:'Rajdhani',sans-serif;font-size:.75rem;letter-spacing:.3em;text-transform:uppercase;color:var(--accent);margin-bottom:.5rem;}
.hero h1{font-family:'Rajdhani',sans-serif;font-size:clamp(1.8rem,4vw,3rem);font-weight:700;letter-spacing:.06em;text-transform:uppercase;line-height:1.1;}
.hero-line{width:60px;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);margin:1rem auto 0;}

/* NAV */
.nav-wrap{position:sticky;top:0;z-index:30;background:rgba(6,8,15,0.97);border-bottom:1px solid var(--border);}
.nav-scroll-wrap{position:relative;max-width:1300px;margin:0 auto;}
.nav-inner{padding:0 2.2rem;display:flex;gap:.1rem;overflow-x:auto;scrollbar-width:none;}
.nav-inner::-webkit-scrollbar{display:none;}
.nav-arrow{position:absolute;top:0;bottom:1px;width:2rem;display:flex;align-items:center;justify-content:center;background:rgba(6,8,15,0.97);border:none;color:var(--muted);cursor:pointer;font-size:.9rem;z-index:2;}
.nav-arrow.left{left:0;background:linear-gradient(90deg,rgba(6,8,15,1),rgba(6,8,15,0));}
.nav-arrow.right{right:0;background:linear-gradient(270deg,rgba(6,8,15,1),rgba(6,8,15,0));}
.nav-arrow:hover{color:var(--text);}
.tab-btn{background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:'Rajdhani',sans-serif;font-size:.88rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:.85rem .9rem;cursor:pointer;transition:all .2s;white-space:nowrap;margin-bottom:-1px;display:flex;align-items:center;gap:.35rem;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:var(--text);border-bottom-color:var(--accent);}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.dot-done{background:#4ade80;}
.dot-live{background:var(--gold);animation:blink 1.2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.25;}}

/* MAIN */
main{position:relative;z-index:5;max-width:1300px;margin:0 auto;padding:1.5rem;}
.panel{display:none;}
.panel.active{display:block;animation:panelIn .25s ease;}
@keyframes panelIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}

/* SECTION TITLE */
.sec-title{font-family:'Rajdhani',sans-serif;font-size:.78rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:.75rem;margin-bottom:1rem;margin-top:1.8rem;}
.sec-title:first-child{margin-top:0;}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border);}
.stag{padding:2px 8px;border-radius:2px;font-size:.63rem;letter-spacing:.1em;}
.stag-done{background:rgba(74,222,128,.12);color:#4ade80;}
.stag-live{background:rgba(251,191,36,.18);color:var(--gold);}
.stag-upcoming{background:rgba(107,122,153,.12);color:var(--muted);}

/* CARDS */
.results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:.85rem;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:4px;overflow:hidden;cursor:pointer;transition:all .22s;position:relative;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),transparent);opacity:0;transition:opacity .22s;}
.card:hover{border-color:rgba(232,25,44,.3);transform:translateY(-2px);box-shadow:0 10px 30px rgba(0,0,0,.5);}
.card:hover::before{opacity:1;}
.card-head{padding:.6rem .9rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.card-label{font-family:'Rajdhani',sans-serif;font-size:.78rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;}
.card-chip{font-family:'Rajdhani',sans-serif;font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:2px 7px;border-radius:2px;}
.chip-general{background:rgba(251,191,36,.15);color:var(--gold);}
.chip-classe{background:rgba(59,130,246,.15);color:var(--accent3);}
.chip-genclasse{background:rgba(168,85,247,.15);color:#c084fc;}
.card-img{width:100%;aspect-ratio:16/9;background:var(--surface2);overflow:hidden;display:flex;align-items:center;justify-content:center;}
.card-img img{width:100%;height:100%;object-fit:cover;}
.card-foot{padding:.5rem .9rem;display:flex;align-items:center;justify-content:space-between;}
.card-date{font-size:.7rem;color:var(--muted);}
.card-cta{font-family:'Rajdhani',sans-serif;font-size:.7rem;font-weight:600;letter-spacing:.07em;color:var(--accent);text-transform:uppercase;}

/* CALENDAR */
.cal-intro{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent3);border-radius:4px;padding:1rem 1.2rem;margin-bottom:1.2rem;font-size:.82rem;color:var(--muted);line-height:1.6;}
.cal-intro strong{color:var(--text);}
.cal-grid{display:flex;flex-direction:column;gap:.45rem;}
.week-block{background:var(--surface);border:1px solid var(--border);border-radius:4px;overflow:hidden;}
.week-head{background:#0a0e1a;padding:.5rem 1rem;display:flex;align-items:center;gap:.7rem;border-bottom:1px solid var(--border);}
.week-num{font-family:'Rajdhani',sans-serif;font-size:.62rem;font-weight:700;letter-spacing:.12em;background:var(--accent);color:#fff;padding:2px 7px;border-radius:2px;}
.week-label{font-family:'Rajdhani',sans-serif;font-size:.8rem;font-weight:600;color:var(--text);}
.week-status{font-family:'Rajdhani',sans-serif;font-size:.6rem;font-weight:700;letter-spacing:.1em;padding:2px 8px;border-radius:2px;margin-left:auto;}
.ws-done{background:rgba(74,222,128,.12);color:#4ade80;}
.ws-live{background:rgba(251,191,36,.18);color:var(--gold);}
.ws-upcoming{background:rgba(107,122,153,.1);color:var(--muted);}
.week-rallyes{display:grid;grid-template-columns:1fr 1fr;}
.w-rally{padding:.6rem 1rem;display:flex;flex-direction:column;gap:.2rem;}
.w-rally.right{border-left:1px solid var(--border);}
.rtype{font-family:'Rajdhani',sans-serif;font-size:.58rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:.05rem;}
.rtype-n{color:#60a5fa;}.rtype-r{color:#f87171;}
.rname{font-family:'Rajdhani',sans-serif;font-size:.85rem;font-weight:600;color:var(--text);}
.rdept{font-size:.7rem;color:var(--muted);}

/* EMPTY STATE */
.empty-state{text-align:center;padding:3rem;color:var(--muted);}
.empty-state .ei{font-size:3rem;opacity:.15;margin-bottom:1rem;}
.empty-state .et{font-family:'Rajdhani',sans-serif;font-size:.8rem;letter-spacing:.15em;text-transform:uppercase;}

/* LIGHTBOX */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:1000;flex-direction:column;backdrop-filter:blur(6px);}
.lightbox.open{display:flex;}
.lb-bar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.2rem;border-bottom:1px solid var(--border);background:rgba(6,8,15,.95);}
.lb-title{font-family:'Rajdhani',sans-serif;font-size:.85rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);}
.lb-controls{display:flex;align-items:center;gap:.5rem;}
.lb-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);height:28px;padding:0 10px;border-radius:3px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:.8rem;font-weight:600;transition:all .2s;}
.lb-btn:hover{background:rgba(255,255,255,.1);}
.lb-close{background:var(--surface);border:1px solid var(--border);color:var(--text);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.lb-close:hover{background:var(--accent);border-color:var(--accent);}
.lb-scroll{flex:1;overflow:auto;display:flex;justify-content:center;padding:1.5rem 1rem;}
.lb-img-wrap{display:inline-block;transform-origin:top center;transition:transform .15s;}
.lb-img-wrap img{display:block;width:min(900px,90vw);border-radius:4px;border:1px solid var(--border);}
.lb-zoom-info{font-family:'Rajdhani',sans-serif;font-size:.78rem;color:var(--muted);min-width:3.2rem;text-align:center;}

footer{position:relative;z-index:5;text-align:center;padding:2rem;border-top:1px solid var(--border);color:var(--muted);font-size:.72rem;letter-spacing:.08em;}
@media(max-width:640px){.week-rallyes{grid-template-columns:1fr;}.w-rally.right{border-left:none;border-top:1px solid var(--border);}.header-right{display:none;}.results-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <img src="afrl_logo.png" alt="AFRL" style="height:38px;width:auto;"/>
    <div class="header-right">Coupe de France 2026</div>
  </div>
</header>

<div class="hero">
  <div class="hero-eyebrow">ABS French Rally League</div>
  <h1>Résultats &amp; Calendrier 2026</h1>
  <div class="hero-line"></div>
</div>

<div class="nav-wrap">
  <div class="nav-scroll-wrap">
    <button class="nav-arrow left" onclick="document.getElementById('navInner').scrollBy({left:-200,behavior:'smooth'})">‹</button>
    <div class="nav-inner" id="navInner"></div>
    <button class="nav-arrow right" onclick="document.getElementById('navInner').scrollBy({left:200,behavior:'smooth'})">›</button>
  </div>
</div>

<main id="mainContent">
  <div class="panel active" id="panel-general">
    <div class="sec-title">Classement Général Saison <span class="stag stag-live">En cours</span></div>
    <div class="results-grid" id="generalGrid"></div>
  </div>
  <div class="panel" id="panel-classes">
    <div class="sec-title">Classements par Classe <span class="stag stag-live">En cours</span></div>
    <div class="results-grid" id="classesGrid"></div>
  </div>
  <div class="panel" id="panel-calendrier">
    <div class="cal-intro">Calendrier <strong>Coupe de France AFRL 2026</strong> — 23 semaines · <span style="color:#60a5fa">◼ Nationale</span> &nbsp;<span style="color:#f87171">◼ Régionale</span></div>
    <div class="cal-grid" id="calGrid"></div>
  </div>
</main>

<div class="lightbox" id="lightbox">
  <div class="lb-bar">
    <span class="lb-title" id="lbTitle"></span>
    <div class="lb-controls">
      <button class="lb-btn" onclick="lbZoom(-0.25)">− Zoom</button>
      <span class="lb-zoom-info" id="lbZoomInfo">100%</span>
      <button class="lb-btn" onclick="lbZoom(+0.25)">+ Zoom</button>
      <button class="lb-btn" onclick="lbReset()">↺ Reset</button>
      <button class="lb-close" onclick="closeLB()">✕</button>
    </div>
  </div>
  <div class="lb-scroll" id="lbScroll">
    <div class="lb-img-wrap" id="lbWrap">
      <img id="lbImg" src="" alt=""/>
    </div>
  </div>
</div>

<footer>ABS French Rally League &nbsp;·&nbsp; Coupe de France 2026</footer>

<script>
// ══════════════════════════════════════
// VERSIONS — GitHub raw (public)
// ══════════════════════════════════════
const GH_RAW = 'https://raw.githubusercontent.com/daco2A22/afrl-resultats/main/versions.json';
let VERSIONS = {};

async function loadVersions(){
  try {
    const r = await fetch(GH_RAW + '?t=' + Date.now());
    if(r.ok){ const d = await r.json(); VERSIONS = d.versions || {}; }
  } catch(e){ VERSIONS = {}; }
}

// ══════════════════════════════════════
// IMAGE URL
// Clé = "general/classement_general"
//       "s01/s01_r1_general" etc.
// ══════════════════════════════════════
function imgUrl(key){
  if(VERSIONS[key]) return VERSIONS[key];
  // Pas encore uploadé → retourne null
  return null;
}

// ══════════════════════════════════════
// CARD
// ══════════════════════════════════════
function mkCard(key, label, chip, chipLabel, date){
  const url = imgUrl(key);
  if(!url) return ''; // Cacher si pas d'image
  return `<div class="card" onclick="openLB('${url}','${label}')">
    <div class="card-head"><span class="card-label">${label}</span><span class="card-chip ${chip}">${chipLabel}</span></div>
    <div class="card-img"><img src="${url}" data-key="${key}" alt="${label}" onerror="this.closest('.card').style.display='none'"/></div>
    <div class="card-foot"><span class="card-date">${date}</span><span class="card-cta">Agrandir →</span></div>
  </div>`;
}

// ══════════════════════════════════════
// DONNÉES SEMAINES
// ══════════════════════════════════════
const ALL_WEEKS = [
  {id:'s01',label:'S01',status:'done',title:'S01 — Centre Alsace & Faverge',
    rallyes:[{type:'N',name:'Centre Alsace',dept:''},{type:'R',name:'Faverge',dept:''}]},

  {id:'s03',label:'S03',status:'live',title:'S03 — Semaine 1 — 13/19 Avril',

  {id:'s06',label:'S06',status:'upcoming',title:'S06 — Semaine 4 — 27 Avr/3 Mai',
    rallyes:[{type:'N',name:"Rallye du Val d'Agout",dept:'81 – Tarn'},{type:'R',name:'Rallye du Beaufortain',dept:'73 – Savoie'}]},
  {id:'s07',label:'S07',status:'upcoming',title:'S07 — Semaine 5 — 4/10 Mai',
    rallyes:[{type:'N',name:'Rallye des Monts de Blond',dept:'87 – Haute-Vienne'},{type:'R',name:'Rallye des Monts de Vaucluse',dept:'84 – Vaucluse'}]},
  {id:'s08',label:'S08',status:'upcoming',title:'S08 — Semaine 6 — 11/17 Mai',
    rallyes:[{type:'N',name:'Rallye du Saint-Émilion',dept:'33 – Gironde'},{type:'R',name:'Rallye de Mézidon',dept:'14 – Calvados'}]},
  {id:'s09',label:'S09',status:'upcoming',title:'S09 — Semaine 7 — 18/24 Mai',
    rallyes:[{type:'N',name:'Rallye du Pays de Seyssel',dept:'74 – Haute-Savoie'},{type:'R',name:"Rallye du Val d'Orain",dept:'39 – Jura'}]},
  {id:'s10',label:'S10',status:'upcoming',title:'S10 — Semaine 8 — 25/31 Mai',

    rallyes:[{type:'N',name:'Rallye du Pays Basque',dept:'64 – Pyrénées-Atlantiques'},{type:'R',name:'Rallye de Chartreuse',dept:'38 – Isère'}]},
];

const CLASSES = [
  {label:'Rally2 / R5',key:'rally2_r5'},
  {label:'Super 2000', key:'super_2000'},
  {label:'RGT',        key:'rgt'},
  {label:'Rally3',     key:'rally3'},
  {label:'A8',         key:'a8'},
  {label:'N4',         key:'n4'},
  {label:'R4',         key:'r4'},
  {label:'Rally4',     key:'rally4'},
  {label:'R3',         key:'r3'},
  {label:'Super 1600', key:'super_1600'},
  {label:'R2',         key:'r2'},
  {label:'A7',         key:'a7'},
  {label:'A6',         key:'a6'},
  {label:'Rally5',     key:'rally5'},
  {label:'R1',         key:'r1'},
];

// ══════════════════════════════════════
// STATUT AUTO des semaines
// ══════════════════════════════════════
const STATUS_STAG  = {done:'stag-done', live:'stag-live', upcoming:'stag-upcoming'};
const STATUS_LABEL = {done:'Terminé',   live:'En cours',  upcoming:'À venir'};

function getWeekStatus(w, idx){
  const sid = w.id;
  const mainKeys = [
    `${sid}/${sid}_r1_general`,
    `${sid}/r1_general_classe`,
    `${sid}/${sid}_r2_general`,
    `${sid}/r2_general_classe`,
    `${sid}/general`,
    `${sid}/general_classe`,
  ];
  const hasAll = mainKeys.every(k => VERSIONS[k]);
  const hasAny = mainKeys.some(k => VERSIONS[k]);

  if(hasAll) return 'done';
  if(hasAny) return 'live';

  // Si la semaine précédente est terminée → cette semaine est "En cours"
  if(idx > 0){
    const prev = ALL_WEEKS[idx - 1];
    const psid = prev.id;
    const prevKeys = [
      `${psid}/${psid}_r1_general`,
      `${psid}/r1_general_classe`,
      `${psid}/${psid}_r2_general`,
      `${psid}/r2_general_classe`,
      `${psid}/general`,
      `${psid}/general_classe`,
    ];
    if(prevKeys.every(k => VERSIONS[k])) return 'live';
  }

  return 'upcoming';
}

function buildNav(){
  const nav = document.getElementById('navInner');
  let html = `<button class="tab-btn" onclick="switchTab('calendrier',this)">📅 Calendrier</button>`;
  html += `<button class="tab-btn active" onclick="switchTab('general',this)">🏆 Général</button>`;
  html += `<button class="tab-btn" onclick="switchTab('classes',this)">📊 Classes</button>`;
  ALL_WEEKS.forEach((w, idx)=>{
    const status = getWeekStatus(w, idx);
    const dot = status === 'done' ? `<span class="dot dot-done"></span>`
              : status === 'live' ? `<span class="dot dot-live"></span>`
              : '';
    html += `<button class="tab-btn" onclick="switchTab('${w.id}',this)">${dot}${w.label}</button>`;
  });
  nav.innerHTML = html;
}

// ══════════════════════════════════════
// BUILD WEEK PANELS
// ══════════════════════════════════════
function buildWeekPanels(){
  const main = document.getElementById('mainContent');
  ALL_WEEKS.forEach((w, idx)=>{
    const status = getWeekStatus(w, idx);
    const stag = `<span class="stag ${STATUS_STAG[status]}">${STATUS_LABEL[status]}</span>`;
    const r = w.rallyes;
    const sid = w.id;

    if(status === 'done' || status === 'live'){
      // Cartes générales
      const generalCards = [
        mkCard(`${sid}/${sid}_r1_general`, r[0].name, 'chip-general', 'Général', r[0].dept||w.label),
        mkCard(`${sid}/r1_general_classe`, `Gén. par Classe — ${r[0].name}`, 'chip-genclasse', 'Gén. Classe', r[0].dept||w.label),
        r[1] ? mkCard(`${sid}/${sid}_r2_general`, r[1].name, 'chip-general', 'Général', r[1].dept||w.label) : '',
        r[1] ? mkCard(`${sid}/r2_general_classe`, `Gén. par Classe — ${r[1].name}`, 'chip-genclasse', 'Gén. Classe', r[1].dept||w.label) : '',
        mkCard(`${sid}/general`, `Classement Général ${w.label}`, 'chip-general', 'Général', w.label),
        mkCard(`${sid}/general_classe`, `Général par Classe ${w.label}`, 'chip-genclasse', 'Gén. Classe', w.label),
      ].join('');

      // Cartes classes R1
      const classesR1 = CLASSES.map(c=>
        mkCard(`${sid}/r1_classe_${c.key}`, c.label, 'chip-classe', 'Classe', r[0].name)
      ).join('');

      // Cartes classes R2
      const classesR2 = r[1] ? CLASSES.map(c=>
        mkCard(`${sid}/r2_classe_${c.key}`, c.label, 'chip-classe', 'Classe', r[1].name)
      ).join('') : '';

      let html = `<div class="panel" id="panel-${sid}">`;
      html += `<div class="sec-title">${w.title} ${stag}</div>`;
      html += `<div class="results-grid">${generalCards}</div>`;
      if(classesR1){
        html += `<div class="sec-title">Classes — ${r[0].name} <span style="color:#60a5fa;font-size:.65rem">◼ Nationale</span></div>`;
        html += `<div class="results-grid">${classesR1}</div>`;
      }
      if(classesR2){
        html += `<div class="sec-title">Classes — ${r[1].name} <span style="color:#f87171;font-size:.65rem">◼ Régionale</span></div>`;
        html += `<div class="results-grid">${classesR2}</div>`;
      }
      html += `</div>`;
      main.insertAdjacentHTML('beforeend', html);
    } else {
      const info = r.map(rv=>`<span><span style="color:${rv.type==='N'?'#60a5fa':'#f87171'}">◼</span> ${rv.name}${rv.dept?' <span style="opacity:.5;font-size:.7rem">'+rv.dept+'</span>':''}</span>`).join('');
      main.insertAdjacentHTML('beforeend',`
        <div class="panel" id="panel-${sid}">
          <div class="sec-title">${w.title} ${stag}</div>
          <div style="padding:.25rem 0 .75rem;color:var(--muted);font-size:.78rem;display:flex;gap:2rem;flex-wrap:wrap;">${info}</div>
          <div class="empty-state"><div class="ei">🏁</div><div class="et">Résultats disponibles après la manche</div></div>
        </div>`);
    }
  });
}

// ══════════════════════════════════════
// BUILD CALENDAR
// ══════════════════════════════════════
function buildCalendar(){
  const g = document.getElementById('calGrid');
  const wsC = {done:'ws-done',live:'ws-live',upcoming:'ws-upcoming'};
  ALL_WEEKS.forEach((w, idx)=>{
    const status = getWeekStatus(w, idx);
    const left  = w.rallyes.find(r=>r.type==='N') || w.rallyes[0];
    const right = w.rallyes.find(r=>r.type==='R') || null;
    const mkR = (r,side) => r ? `<div class="w-rally ${side}"><div class="rtype rtype-${r.type.toLowerCase()}">◼ ${r.type==='N'?'Nationale':'Régionale'}</div><div class="rname">${r.name}</div>${r.dept?`<div class="rdept">${r.dept}</div>`:''}</div>` : `<div class="w-rally ${side}"></div>`;
    g.innerHTML += `<div class="week-block"><div class="week-head"><span class="week-num">${w.label}</span><span class="week-label">${w.title.replace(w.label+' — ','')}</span><span class="week-status ${wsC[status]}">${STATUS_LABEL[status]}</span></div><div class="week-rallyes">${mkR(left,'left')}${mkR(right,'right')}</div></div>`;
  });
}

// ══════════════════════════════════════
// TABS
// ══════════════════════════════════════
function switchTab(id, btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  const p = document.getElementById('panel-'+id);
  if(p) p.classList.add('active');
  if(btn) btn.classList.add('active');
}

// ══════════════════════════════════════
// LIGHTBOX
// ══════════════════════════════════════
let lbScale = 1;
function openLB(src, title){
  lbScale = 1;
  document.getElementById('lbImg').src = src;
  document.getElementById('lbTitle').textContent = title;
  document.getElementById('lbWrap').style.transform = 'scale(1)';
  document.getElementById('lbZoomInfo').textContent = '100%';
  document.getElementById('lbScroll').scrollTop = 0;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function lbZoom(delta){
  lbScale = Math.min(4, Math.max(0.5, lbScale + delta));
  document.getElementById('lbWrap').style.transform = `scale(${lbScale})`;
  document.getElementById('lbWrap').style.transformOrigin = 'top center';
  document.getElementById('lbZoomInfo').textContent = Math.round(lbScale*100)+'%';
}
function lbReset(){
  lbScale = 1;
  document.getElementById('lbWrap').style.transform = 'scale(1)';
  document.getElementById('lbZoomInfo').textContent = '100%';
  document.getElementById('lbScroll').scrollTop = 0;
}
function closeLB(){
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeLB(); });
document.addEventListener('DOMContentLoaded', ()=>{
  document.getElementById('lbScroll').addEventListener('wheel', e=>{
    if(!document.getElementById('lightbox').classList.contains('open')) return;
    e.preventDefault();
    lbZoom(e.deltaY < 0 ? 0.15 : -0.15);
  },{passive:false});
  document.getElementById('lbScroll').addEventListener('click', e=>{
    if(e.target === document.getElementById('lbScroll')) closeLB();
  });
});

// ══════════════════════════════════════
// BROADCAST — mise à jour instantanée
// depuis l'admin sans Ctrl+R
// ══════════════════════════════════════
try {
  const bc = new BroadcastChannel('afrl_updates');
  bc.onmessage = (e)=>{
    const {key, url, deleted} = e.data;
    if(!key) return;
    if(deleted){
      // Supprimer l'image du site
      delete VERSIONS[key];
      document.querySelectorAll(`img[data-key="${key}"]`).forEach(img=>{
        img.closest('.card').style.display = 'none';
      });
    } else if(url){
      // Ajouter/mettre à jour l'image
      VERSIONS[key] = url;
      document.querySelectorAll(`img[data-key="${key}"]`).forEach(img=>{
        img.src = url;
        img.closest('.card').style.display = '';
      });
      rebuildPanel(key);
    }
  };
} catch(e){}

function rebuildPanel(key){
  const sid = key.split('/')[0];
  const panel = document.getElementById('panel-' + sid);
  if(!panel) return;
  // Reconstruire juste la grille principale du panneau
  const grid = panel.querySelector('.results-grid');
  if(grid) grid.querySelectorAll('.card').forEach(card=>{
    const img = card.querySelector('img');
    if(img && img.dataset.key === key){
      img.src = VERSIONS[key];
      card.style.display = '';
    }
  });
}
async function refreshVersions(){
  try {
    const r = await fetch(GH_RAW + '?t=' + Date.now());
    if(!r.ok) return;
    const d = await r.json();
    const newV = d.versions || {};
    // Mettre à jour les images modifiées
    Object.keys(newV).forEach(key=>{
      if(newV[key] !== VERSIONS[key]){
        VERSIONS[key] = newV[key];
        document.querySelectorAll('.card').forEach(card=>{
          const img = card.querySelector('img');
          if(img && img.src && img.src.includes(key.split('/').pop().split('_').slice(0,-1).join('_'))){
            img.src = newV[key];
            card.style.display = '';
          }
        });
      }
    });
    // Masquer les images supprimées
    Object.keys(VERSIONS).forEach(key=>{
      if(!newV[key]){
        delete VERSIONS[key];
        document.querySelectorAll('.card img').forEach(img=>{
          if(img.src === VERSIONS[key]) img.closest('.card').style.display = 'none';
        });
      }
    });
    VERSIONS = newV;
    localStorage.setItem('afrl_versions_cache', JSON.stringify(VERSIONS));
  } catch(e){}
}
setInterval(refreshVersions, 10000);

// ══════════════════════════════════════
// INIT — affichage immédiat depuis cache
// ══════════════════════════════════════

// 1. Charger le cache localStorage immédiatement
const cached = localStorage.getItem('afrl_versions_cache');
if(cached){ try { VERSIONS = JSON.parse(cached); } catch(e){} }

// 2. Construire le site tout de suite avec le cache
buildNav();
buildGeneral();
buildClasses();
buildWeekPanels();
buildCalendar();

// 3. Charger les vraies versions depuis GitHub en arrière-plan
loadVersions().then(()=>{
  // Sauvegarder dans le cache
  localStorage.setItem('afrl_versions_cache', JSON.stringify(VERSIONS));
  // Mettre à jour les cartes si différent du cache
  document.querySelectorAll('img[data-key]').forEach(img=>{
    const key = img.dataset.key;
    const url = VERSIONS[key];
    if(url && img.src !== url){
      img.src = url;
      img.closest('.card').style.display = '';
    } else if(!url){
      img.closest('.card').style.display = 'none';
    }
  });
});
